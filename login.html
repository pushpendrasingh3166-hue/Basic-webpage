<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: url("https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=500&auto=format&fit=crop&q=60") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  form {
    background: rgba(255, 255, 255, 0.521);
    padding: 30px;
    border-radius: 8px;
    width: 300px;
  }
  input {
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px 0;
    border: 1px solid #ccc;
    border-radius: 15px;
    height: 50px;
    color: grey;
    font-size: 16px;
    font-family: Arial, sans-serif;
    box-sizing: border-box;
  }
  button {
    background-color: #4CAF50; 
    color: white; 
    padding: 10px 15px; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    width: 100%;
    font-size: 16px;
    font-family: Arial, sans-serif;
  }
  button:hover { background-color: #45a049; }
  h2 { text-align: center; color: #333; }
  form a { text-decoration: none; color: blue; font-size: 14px; font-family: Arial, sans-serif; }
  p { text-align: center; font-size: 14px; }
</style>
</head>
<body>
  <form id="loginForm">
    <h2>Login</h2>
    <input type="email" id="email" required placeholder="Enter your email"><br>
    <input type="password" id="password" required placeholder="Enter your password"><br>
    <button type="submit">Login</button>
    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
  </form>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const users = JSON.parse(localStorage.getItem('users')) || [];

      const foundUser = users.find(user => user.email === email && user.password === password);

      if (foundUser) {
        localStorage.setItem('loggedIn', foundUser.name); // Mark user as logged in
        alert('Login successful!');
        window.location.href = 'index.html'; // Redirect to dashboard
      } else {
        alert('Invalid email or password!');
      }
    });
  </script>
</body>
</html>
