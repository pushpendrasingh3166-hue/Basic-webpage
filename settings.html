<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Settings</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body {margin:0; font-family: Arial, sans-serif; background-color: #f4f6f9; display:flex;}
  .sidebar {width:220px; height:100vh; background:#2c3e50; color:#fff; position:fixed; top:0; left:0; display:flex; flex-direction:column; padding-top:20px;}
  .sidebar h2 {text-align:center; margin-bottom:30px;}
  .sidebar a {padding:15px 20px; color:#bdc3c7; text-decoration:none; display:flex; align-items:center; gap:10px;}
  .sidebar a.active, .sidebar a:hover {background:#34495e; color:#fff;}
  .main-content {margin-left:220px; padding:40px; flex:1;}
  .settings-section {background:#fff; padding:30px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:20px;}
  label {display:block; margin:10px 0 5px; color:#555;}
  input, select, button {width:100%; padding:8px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; box-sizing:border-box;}
  button {background:#2c3e50; color:#fff; border:none; cursor:pointer;}
  button:hover {background:#34495e;}
  .logout-btn {background:#e74c3c;}
</style>
</head>
<body>

<div class="sidebar">
  <h2>My Dashboard</h2>
  <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
  <a href="#" class="active"><i class="fa-solid fa-sun"></i> Settings</a>
  <a href="help.html"><i class="fa-solid fa-handshake-angle"></i> Help</a>
  <a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<div class="main-content">
  <h1>Settings</h1>

  <div class="settings-section">
    <h3>Account Settings</h3>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email">
    <button id="saveAccount">Save Account Settings</button>
  </div>

  <div class="settings-section">
    <h3>Notifications</h3>
    <label><input type="checkbox" id="emailNotif"> Enable Email Notifications</label>
    <label><input type="checkbox" id="smsNotif"> Enable SMS Notifications</label>
    <button id="saveNotifications">Save Notification Settings</button>
  </div>

  <div class="settings-section">
    <h3>Security</h3>
    <label for="password">Change Password</label>
    <input type="password" id="password" placeholder="New password">
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <button id="updatePassword">Update Password</button>
  </div>

  <div class="settings-section">
    <h3>Theme</h3>
    <label for="themeSelect">Choose Theme</label>
    <select id="themeSelect">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
    <button id="applyThemeBtn">Apply Theme</button>
  </div>

  <div class="settings-section">
    <h3>Delete Account</h3>
    <p style="color:#b00;">Warning: This will delete all saved data!</p>
    <button id="deleteAccountBtn" class="logout-btn">Delete Account</button>
  </div>
</div>

<script>
  // --- LOGIN CHECK ---
  const loggedInUser = localStorage.getItem('loggedIn'); // stores username after login
  if(!loggedInUser){
    alert('You must log in first!');
    window.location.href = 'login.html';
  }

  // Load saved data
  window.addEventListener('DOMContentLoaded', () => {
    if(localStorage.getItem('username')) document.getElementById('username').value = localStorage.getItem('username');
    if(localStorage.getItem('email')) document.getElementById('email').value = localStorage.getItem('email');
    document.getElementById('emailNotif').checked = localStorage.getItem('emailNotif')==='true';
    document.getElementById('smsNotif').checked = localStorage.getItem('smsNotif')==='true';
    const theme = localStorage.getItem('theme') || 'light';
    document.getElementById('themeSelect').value = theme;
    applyTheme(theme);
  });

  // Account settings
  document.getElementById('saveAccount').addEventListener('click', () => {
    localStorage.setItem('username', document.getElementById('username').value);
    localStorage.setItem('email', document.getElementById('email').value);
    alert('Account settings saved!');
  });

  // Notifications
  document.getElementById('saveNotifications').addEventListener('click', () => {
    localStorage.setItem('emailNotif', document.getElementById('emailNotif').checked);
    localStorage.setItem('smsNotif', document.getElementById('smsNotif').checked);
    alert('Notification settings saved!');
  });

  // Password change
  document.getElementById('updatePassword').addEventListener('click', () => {
    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    if(pass.length < 8){ alert('Password must be at least 8 characters'); return; }
    if(pass !== confirmPass){ alert('Passwords do not match'); return; }
    localStorage.setItem('password', pass);
    alert('Password updated!');
    document.getElementById('password').value = '';
    document.getElementById('confirmPassword').value = '';
  });

  // Theme
  document.getElementById('applyThemeBtn').addEventListener('click', () => {
    const theme = document.getElementById('themeSelect').value;
    localStorage.setItem('theme', theme);
    applyTheme(theme);
    alert(theme.charAt(0).toUpperCase() + theme.slice(1) + ' theme applied!');
  });

  function applyTheme(theme){
    if(theme==='dark'){
      document.body.style.backgroundColor = '#1f1f1f';
      document.body.style.color = '#f4f4f4';
    } else {
      document.body.style.backgroundColor = '#f4f6f9';
      document.body.style.color = '#000';
    }
  }

  // Delete account
  document.getElementById('deleteAccountBtn').addEventListener('click', () => {
    if(confirm('Are you sure? This will delete all your data.')){
      localStorage.clear();
      alert('Account deleted!');
      window.location.href = 'signup.html';
    }
  });
</script>
</body>
</html>
