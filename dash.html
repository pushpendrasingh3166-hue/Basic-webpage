<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Better Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: #fff;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      padding-top: 20px;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar a {
      padding: 15px 20px;
      color: #bdc3c7;
      text-decoration: none;
      display: block;
      font-size: 15px;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #34495e;
      color: #fff;
    }

    
    .content {
      margin-left: 220px;
      padding: 20px;
      flex: 1;
    }

    .topbar {
      background: #fff;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
    }
    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

   /* Responsive */
    @media (max-width: 768px) {
      .content {
        margin-left: 0;
        padding: 15px;
      }
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>My Dashboard</h2>
    <a href="index.html" class="active"><i class="fa-solid fa-house"></i> Home</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="settings.html"><i class="fa-solid fa-sun"></i> Settings</a>
    <a href="help.html"><i class="fa-solid fa-handshake-angle"></i> Help</a>
    <a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>

  <div class="content">
    <div class="topbar">
      <h1>Welcome</h1>
      <span><i class="fa-solid fa-bell"></i> Notifications</span>
    </div>
 </div>
</body>
</html>
